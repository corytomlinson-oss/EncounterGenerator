<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Encounter Generator{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dnd: {
              50:  '#fdf4f3', 100: '#fce8e6', 200: '#f9c5c1', 300: '#f59490',
              400: '#ee5c59', 500: '#e13333', 600: '#c02020', 700: '#991818',
              800: '#7e1717', 900: '#6b1919', 950: '#3b0808',
            }
          }
        }
      },
      safelist: [
        /* ── encounter card states (Alpine :class) ── */
        'border-red-400', 'bg-red-50',
        'border-dnd-500', 'bg-dnd-50',
        'border-slate-200', 'bg-white', 'bg-slate-50',
        'opacity-40', 'line-through',

        /* ── HP bar colours ── */
        'bg-emerald-500', 'bg-red-500', 'bg-slate-200',

        /* ── HP counter text ── */
        'text-red-600', 'text-slate-300', 'text-slate-700',

        /* ── Hit / Heal / Reset buttons ── */
        'bg-red-100', 'bg-emerald-100', 'bg-slate-100',
        'text-red-700', 'text-emerald-700', 'text-slate-500',
        'hover:bg-red-200', 'hover:bg-emerald-200', 'hover:bg-slate-200',

        /* ── saves on cards ── */
        'text-dnd-600',

        /* ── stat block header ── */
        'bg-slate-800', 'text-dnd-300',

        /* ── ability score grid ── */
        'grid-cols-6', 'bg-slate-50',

        /* ── trait / section labels ── */
        'text-dnd-700', 'border-dnd-200',
        'text-amber-700', 'border-amber-200',

        /* ── layout helpers only in HTMX content ── */
        'grid-cols-2', 'overflow-hidden', 'shrink-0', 'min-w-0',
        'flex-wrap', 'flex-1', 'leading-none', 'leading-tight',
        'tracking-widest', 'italic', 'select-none', 'truncate',
        'border-b', 'duration-300', 'space-y-2',
      ]
    }
  </script>

  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
  </style>

  <script>
    document.addEventListener('htmx:afterSettle', function () {
      if (window.tailwind && typeof window.tailwind.refresh === 'function') {
        window.tailwind.refresh();
      }
    });
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800">

  <!-- Nav -->
  <nav class="bg-slate-900 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/" class="flex items-center gap-2 text-lg font-bold text-dnd-400 hover:text-dnd-300">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
        </svg>
        Encounter Generator
      </a>
      <div class="flex items-center gap-4 text-sm">
        <a href="/" class="hover:text-dnd-300 transition-colors">Generate</a>
        <a href="/history" class="hover:text-dnd-300 transition-colors">History</a>
        <a href="https://github.com/corytomlinson-oss/EncounterGenerator#readme"
           target="_blank" rel="noopener"
           class="hover:text-dnd-300 transition-colors">README</a>
        <a href="http://webpi.local" class="text-slate-400 hover:text-slate-200 transition-colors text-xs">← Hub</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
